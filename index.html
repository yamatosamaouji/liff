<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE連携</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f5f5f5;
      text-align: center;
    }
    .loading {
      margin-top: 60px;
      font-size: 16px;
      color: #666;
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 20px auto;
      border: 4px solid #e0e0e0;
      border-top: 4px solid #06c755;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="loading">
  <div class="spinner"></div>
  <p>LINE連携中です...<br>しばらくお待ちください</p>
</div>

<script>
(function() {
  // === 設定 ===
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbxDorS8uKdEfaOpzxsvEAB2TdQmw5LqeovuFVHkjmeea9PZBsjnKQpJB6GrFmY9cnI/exec';
  var LIFF_ID = '2006336075-ucke3cuL';
  var LINE_OA_URL = 'https://lin.ee/cTPNnE8';

  // === URLパラメータ取得 ===
  function getParam(name) {
    var match = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
    return match ? decodeURIComponent(match[1]) : '';
  }

  // === 公式アカウントのトーク画面へ遷移 ===
  function goToChat() {
    window.location.href = LINE_OA_URL;
  }

  // === LIFF初期化 → プロフィール取得 → GAS送信 → トーク画面へ ===
  liff.init({ liffId: LIFF_ID })
    .then(function() {
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      return liff.getProfile();
    })
    .then(function(profile) {
      if (!profile) return;

      var uid = getParam('uid');
      var lineUserId = profile.userId;
      var lineDisplayName = profile.displayName;

      // GASにLINE情報を送信（レスポンスを待たずに遷移）
      var params = [
        'action=line',
        'uid=' + encodeURIComponent(uid),
        'line_user_id=' + encodeURIComponent(lineUserId),
        'line_display_name=' + encodeURIComponent(lineDisplayName)
      ].join('&');

      var img = new Image();
      img.src = GAS_URL + '?' + params + '&callback=_liff';

      // 送信後すぐにトーク画面へ
      setTimeout(goToChat, 500);
    })
    .catch(function(err) {
      console.error('LIFF Error:', err);
      goToChat();
    });
})();
</script>

</body>
</html>
